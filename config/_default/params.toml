# -- Theme Options --
# https://blowfish.page/docs/configuration/#theme-parameters

colorScheme = "cyber-carrot"
defaultAppearance = "dark" # valid options: light or dark
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true

disableImageOptimization = false
disableTextInHeader = false

# Sections the homepage "Recent" list pulls from
mainSections = ["posts"]

fingerprintAlgorithm = "sha512"

[header]
  layout = "fixed" # valid options: basic, fixed, fixed-fill, fixed-gradient, fixed-fill-blur

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "hero" # valid options: page, profile, hero, card, background, custom
  # TODO: drop a hero image into assets/img/ then uncomment and set the filename
  # homepageImage = "img/hero.jpg"
  showRecent = true
  showRecentItems = 6
  showMoreLink = true
  showMoreLinkDest = "/posts/"
  cardView = true
  layoutBackgroundBlur = false
  disableHeroImageFilter = false

[article]
  showDate = true
  showAuthor = true
  showHero = false
  showBreadcrumbs = false
  showDraftLabel = true
  showHeadingAnchors = true
  showPagination = true
  showReadingTime = true
  showTableOfContents = false
  showTaxonomies = true
  showCategories = true
  showTags = true
  showWordCount = false

[list]
  showHero = false
  showBreadcrumbs = false
  showSummary = true
  showCards = true
  groupByYear = false
  cardView = true

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true
  cardView = false

[term]
  showHero = false
  showTableOfContents = true
